<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Time Satellite 1 — GenArtTable</title>
    <meta
      name="description"
      content="Snapshot of the modular raster clock experiment captured as Time Satellite 1."
    />
    <meta property="og:title" content="Time Satellite 1 — GenArtTable" />
    <meta
      property="og:description"
      content="Snapshot of the modular raster clock experiment captured as Time Satellite 1."
    />
    <meta property="og:image" content="../og-default.svg" />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <div id="shell">
      <header id="top-nav">
        <a href="../" id="nav-credits">credits</a>
        <a href="../" id="nav-all">all posts</a>
      </header>

      <main id="art-container" aria-live="polite"></main>
      <section id="panel" hidden></section>

      <button id="fullscreen-btn" aria-label="Toggle fullscreen">
        <svg id="fs-expand" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <polyline points="10,2 14,2 14,6" /><line x1="14" y1="2" x2="9" y2="7" />
          <polyline points="6,14 2,14 2,10" /><line x1="2" y1="14" x2="7" y2="9" />
        </svg>
        <svg id="fs-compress" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none">
          <polyline points="14,6 10,6 10,2" /><line x1="10" y1="6" x2="15" y2="1" />
          <polyline points="2,10 6,10 6,14" /><line x1="6" y1="10" x2="1" y2="15" />
        </svg>
      </button>

      <footer id="bottom-nav">
        <a href="../" id="nav-next">next</a>
        <a href="../" id="nav-random">random</a>
        <a href="../" id="deep-link">deep link</a>
      </footer>
    </div>

    <script type="module" src="../app.js"></script>
    <script>
      setTimeout(() => {
        const isFileUrl = window.location.protocol === "file:";
        const hasCanvas = document.querySelector("canvas.art-canvas");
        if (!isFileUrl || hasCanvas) return;

        const panel = document.getElementById("panel");
        const artContainer = document.getElementById("art-container");
        if (!panel || !artContainer) return;

        artContainer.hidden = true;
        panel.hidden = false;
        panel.textContent = "Time Satellite 1 uses ES modules and must be opened through a local HTTP server. Run `npm run dev` in the GenArtTable repo, then open http://localhost:8087/works/time-satellite-1.html";
      }, 500);
    </script>
  </body>
</html>
